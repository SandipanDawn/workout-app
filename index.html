
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Elite Pro</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; padding:12px;}
h2,h3 { text-align:center; }
button { width:100%; padding:14px; margin:6px 0; border:none; border-radius:10px; background:#2563eb; color:white;}
.card { background:#1e293b; padding:12px; margin:10px 0; border-radius:12px;}
.progress { height:18px; background:#334155; border-radius:10px; overflow:hidden; margin:10px 0;}
.progress-bar { height:100%; background:#22c55e; width:0%;}
.hidden { display:none;}
.footer { text-align:center; margin-top:20px; font-size:12px; color:#94a3b8;}
</style>
</head>
<body>

<h2>🔥💪 Workout Elite Pro 🏋️‍♂️</h2>

<div id="home">
<button onclick="showSection('workout')">💪 Workout</button>
<button onclick="showSection('progress')">📊 Progress Dashboard</button>
</div>

<!-- WORKOUT -->
<div id="workout" class="hidden">
<button onclick="openDay('Day 1')">Day 1 – Chest</button>
<button onclick="openDay('Day 2')">Day 2 – Back</button>
<button onclick="openDay('Day 3')">Day 3 – Legs</button>
<button onclick="openDay('Day 4')">Day 4 – Chest Var</button>
<button onclick="openDay('Day 5')">Day 5 – Back Var</button>
<button onclick="openDay('Day 6')">Day 6 – Light</button>
<button onclick="goHome()">⬅ Back</button>
</div>

<!-- DAY -->
<div id="dayContainer" class="hidden">
<h3 id="dayTitle"></h3>
<div class="progress"><div id="progressBar" class="progress-bar"></div></div>
<div id="exerciseList"></div>
<button onclick="completeWorkout()">✅ Mark Workout Complete</button>
<button onclick="resetDay()">🔄 Reset</button>
<button onclick="backWorkout()">⬅ Back</button>
</div>

<!-- PROGRESS -->
<div id="progress" class="hidden">
<h3>📊 Your Progress</h3>

<div class="card">🔥 Streak: <span id="streak">0</span> days</div>
<div class="card">📅 Total Workout Days: <span id="totalDays">0</span></div>
<div class="card">💪 Chest Days: <span id="chestDays">0</span></div>
<div class="card">🦾 Back Days: <span id="backDays">0</span></div>
<div class="card">🦵 Leg Days: <span id="legDays">0</span></div>

<button onclick="goHome()">⬅ Back</button>
</div>

<div class="footer">Made by Sandipan & Tesla 🚀</div>

<script>
const workouts = {
"Day 1":["Chest Press","Incline DB Press","Pec Deck","Shoulder Press","Lateral Raise","Triceps Pushdown"],
"Day 2":["Lat Pulldown","Cable Row","Machine Row","Face Pull","DB Curl","Hammer Curl"],
"Day 3":["Leg Press","Hack Squat","Leg Extension","Leg Curl","Calf Raise"],
"Day 4":["Incline Press","Cable Fly","Flat DB Press"],
"Day 5":["Pulldown","Row","Curl"],
"Day 6":["Walk","Core","Plank"]
};

let currentDay="";

function showSection(id){
hideAll();
document.getElementById(id).classList.remove("hidden");
if(id==="progress") updateDashboard();
}

function openDay(day){
currentDay=day;
hideAll();
document.getElementById("dayContainer").classList.remove("hidden");
document.getElementById("dayTitle").innerText=day;
render();
updateProgress();
}

function render(){
let c=document.getElementById("exerciseList");
c.innerHTML="";
workouts[currentDay].forEach((ex,i)=>{
c.innerHTML+=`<div class="card"><b>${ex}</b><br>`;
for(let s=1;s<=3;s++){
let key=currentDay+i+s;
let checked=localStorage.getItem(key)==="true";
c.innerHTML+=`<label><input type="checkbox" ${checked?"checked":""} onchange="toggle('${key}')"> Set ${s}</label><br>`;
}
c.innerHTML+=`</div>`;
});
}

function toggle(key){
let val=localStorage.getItem(key)==="true";
localStorage.setItem(key,!val);
updateProgress();
}

function updateProgress(){
let total=workouts[currentDay].length*3;
let done=0;
for(let i=0;i<workouts[currentDay].length;i++){
for(let s=1;s<=3;s++){
if(localStorage.getItem(currentDay+i+s)==="true") done++;
}
}
let percent=Math.floor((done/total)*100);
document.getElementById("progressBar").style.width=percent+"%";
}

function completeWorkout(){
let today=new Date().toDateString();
let history=JSON.parse(localStorage.getItem("history")||"{}");
history[today]=currentDay;
localStorage.setItem("history",JSON.stringify(history));
updateStreak();
alert("Workout Logged ✅");
}

function updateStreak(){
let history=JSON.parse(localStorage.getItem("history")||"{}");
let dates=Object.keys(history).sort();
let streak=0;
for(let i=dates.length-1;i>=0;i--){
if(i===dates.length-1) streak=1;
else{
let d1=new Date(dates[i+1]);
let d2=new Date(dates[i]);
if((d1-d2)/(1000*60*60*24)===1) streak++;
else break;
}
}
localStorage.setItem("streak",streak);
}

function updateDashboard(){
let history=JSON.parse(localStorage.getItem("history")||"{}");
let values=Object.values(history);

document.getElementById("totalDays").innerText=values.length;
document.getElementById("streak").innerText=localStorage.getItem("streak")||0;

document.getElementById("chestDays").innerText=values.filter(v=>v.includes("1")||v.includes("4")).length;
document.getElementById("backDays").innerText=values.filter(v=>v.includes("2")||v.includes("5")).length;
document.getElementById("legDays").innerText=values.filter(v=>v.includes("3")).length;
}

function resetDay(){
for(let i=0;i<workouts[currentDay].length;i++){
for(let s=1;s<=3;s++){
localStorage.removeItem(currentDay+i+s);
}
}
render(); updateProgress();
}

function hideAll(){
["home","workout","progress","dayContainer"].forEach(id=>{
let el=document.getElementById(id);
if(el) el.classList.add("hidden");
});
}

function goHome(){
hideAll();
document.getElementById("home").classList.remove("hidden");
}

function backWorkout(){
hideAll();
document.getElementById("workout").classList.remove("hidden");
}
</script>

</body>
</html>
