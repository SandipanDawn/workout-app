<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Pro</title>

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}
.container{padding:18px;max-width:500px;margin:auto;}
h1{text-align:center;font-size:24px;margin-bottom:20px;}
.nav-btn{
width:100%;padding:16px;margin:8px 0;border-radius:14px;border:none;
background:linear-gradient(135deg,#3b82f6,#6366f1);
color:white;font-size:16px;font-weight:600;
}
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:16px;border-radius:18px;margin:12px 0;
box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.set{
padding:10px;margin:5px;border-radius:10px;
background:#334155;display:inline-block;cursor:pointer;
}
.set.active{background:#22c55e;}
.machine{padding:12px;margin:6px 0;border-radius:12px;background:#334155;text-align:center;cursor:pointer;}
.machine.active{background:#22c55e;}
.stat{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.1);}
.hidden{display:none}

/* Slider */
.pro-slider{
-webkit-appearance:none;
width:100%;
height:10px;
border-radius:10px;
background:linear-gradient(90deg,#3b82f6,#6366f1);
outline:none;
margin-top:10px;
}
.pro-slider::-webkit-slider-thumb{
-webkit-appearance:none;
height:22px;width:22px;border-radius:50%;
background:white;cursor:pointer;margin-top:-6px;
box-shadow:0 0 10px rgba(59,130,246,0.8);
}
.time-display{
text-align:center;margin-top:15px;font-size:28px;font-weight:700;
}
.unit{font-size:16px;opacity:0.7;margin-left:4px;}
</style>
</head>

<body>
<div class="container">

<h1>🔥 Fitness Pro</h1>

<!-- HOME -->
<div id="home">
<button class="nav-btn" onclick="show('workout')">💪 Workout</button>
<button class="nav-btn" onclick="show('cardio')">🏃 Cardio</button>
<button class="nav-btn" onclick="showProgressData()">📊 Progress</button>
</div>

<!-- WORKOUT -->
<div id="workout" class="hidden">

<div class="card" onclick="openDay('push1')">🔥 Push Day 1</div>
<div class="card" onclick="openDay('pull1')">🦾 Pull Day 1</div>
<div class="card" onclick="openDay('legs1')">🦵 Leg Day 1</div>
<div class="card" onclick="openDay('core1')">🧠 Core Day 1</div>

<div class="card" onclick="openDay('push2')">🔥 Push Day 2</div>
<div class="card" onclick="openDay('pull2')">🦾 Pull Day 2</div>
<div class="card" onclick="openDay('legs2')">🦵 Leg Day 2</div>
<div class="card" onclick="openDay('core2')">🧠 Core Day 2</div>

<button class="nav-btn" onclick="show('home')">⬅ Back</button>
</div>

<!-- DAY -->
<div id="day" class="hidden">
<h2 id="title"></h2>
<div id="list"></div>
<button class="nav-btn" onclick="complete()">✅ Complete</button>
<button class="nav-btn" onclick="resetDay()">🔄 Reset</button>
<button class="nav-btn" onclick="show('workout')">⬅ Back</button>
</div>

<!-- CARDIO -->
<div id="cardio" class="hidden">
<div class="card">
<div class="machine" onclick="selectMachine(this,'Treadmill')">🏃 Treadmill</div>
<div class="machine" onclick="selectMachine(this,'Cycling')">🚴 Cycling</div>
<div class="machine" onclick="selectMachine(this,'Stepper')">🪜 Stepper</div>
</div>

<div class="card">
<input type="range" min="10" max="60" value="20" id="slider" class="pro-slider" oninput="updateTime()">
<div class="time-display">
<span id="timeValue">20</span><span class="unit">min</span>
</div>
</div>

<button class="nav-btn" onclick="saveCardio()">Save</button>
<button class="nav-btn" onclick="show('home')">⬅ Back</button>
</div>

<!-- PROGRESS -->
<div id="progress" class="hidden">
<div class="card">
<div class="stat">🔥 Total Days <span id="total">0</span></div>
<div class="stat">❌ Missed Days <span id="missed">0</span></div>
<div class="stat">💪 Push <span id="push">0</span></div>
<div class="stat">🦾 Pull <span id="pull">0</span></div>
<div class="stat">🦵 Legs <span id="legs">0</span></div>
<div class="stat">🧠 Core <span id="core">0</span></div>
<div class="stat">🏃 Cardio (min) <span id="cardioMin">0</span></div>
</div>

<div style="display:flex; gap:10px;">
<div style="flex:1;">
<h4 style="text-align:center;">💪 Workout</h4>
<canvas id="workoutChart"></canvas>
</div>

<div style="flex:1;">
<h4 style="text-align:center;">🏃 Cardio</h4>
<canvas id="cardioChart"></canvas>
</div>
</div>

<button class="nav-btn" onclick="show('home')">⬅ Back</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const workouts={
push1:["Machine Chest Press","Incline Dumbbell Press","Chest Fly","Shoulder Press"],
pull1:["Lat Pulldown","Row","Face Pull","Bicep Curl"],
legs1:["Leg Press","Squat","Leg Curl","Calf Raise"],
core1:["Plank","Dead Bug","Leg Raise"],
push2:["Incline Press","Cable Fly","Flat Press","Lateral Raise"],
pull2:["Lat Pulldown","Cable Row","Curl","Hammer Curl"],
legs2:["Glute Bridge","Lunges","Curl","Calf"],
core2:["Side Plank","Twist","Woodchopper"]
};

let cur="",selectedMachine="";

function show(id){
["home","workout","day","cardio","progress"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

function openDay(d){
cur=d;
show("day");
title.innerText=d.toUpperCase();
let html="";
workouts[d].forEach((e,i)=>{
html+=`<div class="card"><b>${e}</b>`;
for(let s=1;s<=3;s++){
let key=d+i+s;
let active=localStorage[key]=="1";
html+=`<div class="set ${active?"active":""}" onclick="toggle('${key}',this)">Set ${s}</div>`;
}
html+="</div>";
});
list.innerHTML=html;
}

function toggle(k,e){
localStorage[k]=localStorage[k]=="1"?"0":"1";
e.classList.toggle("active");
}

function complete(){
let h=JSON.parse(localStorage.hist||"{}");
h[new Date().toDateString()]={day:cur,exercises:3};
localStorage.hist=JSON.stringify(h);
alert("Saved");
}

function resetDay(){localStorage.clear();location.reload();}

function selectMachine(el,m){
selectedMachine=m;
document.querySelectorAll(".machine").forEach(x=>x.classList.remove("active"));
el.classList.add("active");
}

function updateTime(){
timeValue.innerText=slider.value;
}

function saveCardio(){
let log=JSON.parse(localStorage.cardio||"[]");
log.push({t:parseInt(slider.value),date:new Date().toDateString()});
localStorage.cardio=JSON.stringify(log);
alert("Saved");
}

function showProgressData(){
show("progress");

let h=JSON.parse(localStorage.hist||"{}");
let today=new Date().toDateString();

total.innerText=Object.keys(h).length;

let vals=Object.values(h).map(v=>v.day||"");
push.innerText=vals.filter(v=>v.includes("push")).length;
pull.innerText=vals.filter(v=>v.includes("pull")).length;
legs.innerText=vals.filter(v=>v.includes("legs")).length;
core.innerText=vals.filter(v=>v.includes("core")).length;

let cardio=JSON.parse(localStorage.cardio||"[]");
let todayCardio=cardio.filter(c=>c.date===today).reduce((a,b)=>a+b.t,0);
cardioMin.innerText=cardio.reduce((a,b)=>a+b.t,0);

/* charts */
drawCharts(h,today,todayCardio);
}

function drawCharts(h,today,cardioVal){

let workoutVal=h[today]?.exercises||0;

if(window.wChart) wChart.destroy();
if(window.cChart) cChart.destroy();

wChart=new Chart(document.getElementById("workoutChart"),{
type:'bar',
data:{labels:[today],datasets:[{data:[workoutVal]}]},
options:{plugins:{legend:{display:false}}}
});

cChart=new Chart(document.getElementById("cardioChart"),{
type:'bar',
data:{labels:[today],datasets:[{data:[cardioVal]}]},
options:{plugins:{legend:{display:false}}}
});
}
</script>

</body>
</html>
