<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Fitness System</title>
<style>
body{
font-family:-apple-system;
margin:0;
background:#0f172a;
color:white;
}
.container{padding:16px}
h2,h3{text-align:center;font-weight:700}

button{
width:100%;
padding:16px;
margin:8px 0;
border:none;
border-radius:14px;
background:#3b82f6;
color:white;
font-weight:bold;
font-size:16px;
}

.card{
background:#1e293b;
padding:16px;
margin:10px 0;
border-radius:16px;
}

.set{
padding:12px;
margin:6px 0;
border-radius:12px;
background:#334155;
text-align:center;
cursor:pointer;
font-size:15px;
}
.set.active{background:#22c55e}

.machine-btn{
display:block;
width:100%;
padding:14px;
margin:6px 0;
border-radius:12px;
background:#334155;
text-align:center;
}
.machine-btn.active{background:#22c55e}

.slider{
width:100%;
height:40px;
}

.hidden{display:none}
</style>
</head>

<body>
<div class="container">

<h2>🔥 Ultimate Fitness 💪</h2>

<div id="home">
<button onclick="show('workout')">💪 Workout</button>
<button onclick="show('cardio')">🏃 Cardio</button>
<button onclick="showProgress()">📊 Progress</button>
</div>

<div id="workout" class="hidden">
<button onclick="openDay('push1')">🔥 Push Day 1</button>
<button onclick="openDay('pull1')">🦾 Pull Day 1</button>
<button onclick="openDay('legs1')">🦵 Legs Day 1</button>
<button onclick="openDay('core1')">🧠 Core Day 1</button>
<button onclick="openDay('push2')">🔥 Push Day 2</button>
<button onclick="openDay('pull2')">🦾 Pull Day 2</button>
<button onclick="openDay('legs2')">🦵 Legs Day 2</button>
<button onclick="openDay('core2')">🧠 Core Day 2</button>
<button onclick="show('home')">⬅ Back</button>
</div>

<div id="day" class="hidden">
<h3 id="title"></h3>
<div id="list"></div>
<button onclick="complete()">✅ Complete Workout</button>
<button onclick="resetDay()">🔄 Reset Day</button>
<button onclick="show('workout')">⬅ Back</button>
</div>

<div id="cardio" class="hidden">
<h3>🏃 Cardio</h3>

<div class="card">
<div class="machine-btn" onclick="selectMachine(this,'Treadmill')">🏃 Treadmill</div>
<div class="machine-btn" onclick="selectMachine(this,'Stepper')">🪜 Stepper Machine</div>
<div class="machine-btn" onclick="selectMachine(this,'Cycling')">🚴 Cycling</div>
</div>

<div class="card">
<input type="range" min="10" max="45" step="5" value="20" id="slider" class="slider" oninput="updateTime()">
<h3 id="time">20 minutes</h3>
</div>

<button onclick="saveCardio()">Save Cardio</button>
<button onclick="show('home')">⬅ Back</button>
</div>

<div id="progress" class="hidden">
<h3>📊 Progress</h3>
<div class="card">🔥 Total Days: <span id="total">0</span></div>
<div class="card">❌ Missed Days: <span id="missed">0</span></div>
<div class="card">💪 Push Days: <span id="push">0</span></div>
<div class="card">🦾 Pull Days: <span id="pull">0</span></div>
<div class="card">🦵 Leg Days: <span id="legs">0</span></div>
<div class="card">🧠 Core Days: <span id="core">0</span></div>
<div class="card">🏃 Cardio Minutes: <span id="cardioMin">0</span></div>
<canvas id="chart"></canvas>
<button onclick="show('home')">⬅ Back</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const workouts={
push1:[
"Machine Chest Press",
"Incline Dumbbell Press",
"Pec Deck Chest Fly",
"Seated Shoulder Press",
"Lateral Raises",
"Triceps Rope Pushdown"
],
pull1:[
"Lat Pulldown",
"Seated Cable Row",
"Chest Supported Row",
"Face Pull",
"Dumbbell Bicep Curl",
"Hammer Curl"
],
legs1:[
"Leg Press",
"Hack Squat Machine",
"Leg Extension (Quadriceps)",
"Lying Leg Curl (Hamstring)",
"Standing Calf Raise"
],
core1:[
"Plank",
"Dead Bug",
"Hanging Knee Raise",
"Bird Dog"
],
push2:[
"Incline Machine Press",
"Cable Chest Fly",
"Flat Dumbbell Press",
"Lateral Raises",
"Overhead Triceps Extension",
"Cable Pushdown"
],
pull2:[
"Close Grip Lat Pulldown",
"Single Arm Cable Row",
"Machine Row",
"Preacher Curl",
"Cable Curl",
"Incline Dumbbell Curl"
],
legs2:[
"Glute Bridge",
"Walking Lunges",
"Seated Leg Curl",
"Seated Calf Raise",
"Leg Extension"
],
core2:[
"Side Plank",
"Russian Twist",
"Cable Woodchopper",
"Dead Bug"
]
};

let cur="",selectedMachine="";

function show(id){
document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function openDay(d){
cur=d;
show("day");
title.innerText=d.replace(/([a-z]+)(\d)/i,"$1 Day $2").toUpperCase();
render();
}

function render(){
list.innerHTML="";
workouts[cur].forEach((ex,i)=>{
let html=`<div class="card"><b>${ex}</b>`;
for(let s=1;s<=3;s++){
let k=cur+i+s,a=localStorage[k]=="1";
html+=`<div class="set ${a?"active":""}" onclick="toggle('${k}',this)">Set ${s}</div>`;
}
html+="</div>";
list.innerHTML+=html;
});
}

function toggle(k,e){
localStorage[k]=localStorage[k]=="1"?"0":"1";
e.classList.toggle("active");
}

function resetDay(){
for(let i=0;i<workouts[cur].length;i++){
for(let s=1;s<=3;s++){
delete localStorage[cur+i+s];
}}
render();
}

function complete(){
let today=new Date().toDateString();
let h=JSON.parse(localStorage.hist||"{}");
h[today]=cur;
localStorage.hist=JSON.stringify(h);
alert("Workout Saved");
}

function selectMachine(el,m){
selectedMachine=m;
document.querySelectorAll(".machine-btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

function updateTime(){
time.innerText=slider.value+" minutes";
}

function saveCardio(){
if(!selectedMachine){alert("Select machine");return;}
let log=JSON.parse(localStorage.cardio||"[]");
log.push({m:selectedMachine,t:parseInt(slider.value)});
localStorage.cardio=JSON.stringify(log);
alert("Cardio Saved");
}

function showProgress(){
show("progress");
let h=JSON.parse(localStorage.hist||"{}");
let dates=Object.keys(h).sort();
let vals=Object.values(h);

total.innerText=vals.length;
push.innerText=vals.filter(v=>v.includes("push")).length;
pull.innerText=vals.filter(v=>v.includes("pull")).length;
legs.innerText=vals.filter(v=>v.includes("legs")).length;
core.innerText=vals.filter(v=>v.includes("core")).length;

let miss=0;
for(let i=1;i<dates.length;i++){
let diff=(new Date(dates[i])-new Date(dates[i-1]))/86400000;
if(diff>1) miss+=diff-1;
}
missed.innerText=miss;

let cardio=JSON.parse(localStorage.cardio||"[]");
cardioMin.innerText=cardio.reduce((a,b)=>a+b.t,0);

drawChart(dates);
}

function drawChart(labels){
let data=labels.map((_,i)=>i+1);
new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:labels,datasets:[{label:"Workout Days",data:data}]}
});
}
</script>

</body>
</html>
